name: Deploy Frontend

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    # Securely bake in GitHub Secrets as compile-time variables 
    # Ensure you've setup PROD_API_URL under Repository -> Settings -> Secrets
    - name: Build and Inject Environment Docker Image
      run: |
        # Write compile-time secrets to local .env so Dockerfile 'COPY . .' ingests them
        cat <<EOF > .env.production
        VITE_API_BASE_URL=${{ secrets.API_BASE_URL }}
        VITE_GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
        EOF
        
        # Build natively without explicit Dockerfile arguments
        docker build -t buddyscript-client:latest .
        
        # Destroy the artifact securely
        rm .env.production

